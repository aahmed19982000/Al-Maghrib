{% extends 'facebook_connect/base.html' %}
{% block title %}اختر صفحة فيسبوك{% endblock %}
{% block content %}
<div class="space-y-4">
    <h1 class="text-lg font-bold text-white text-center">اختر الصفحة المطلوب ربطها</h1>
    <p class="text-sm text-slate-400 text-center leading-relaxed">
        وجدنا أكثر من صفحة تديرها بهذا الحساب. اختر الصفحة الخاصة بـ "<strong>{{ wp_site.name }}</strong>".
    </p>
    <form method="post" action="{% url 'facebook_connect_select_page' token=token %}" class="space-y-3">
        {% csrf_token %}
        {% for page in pages %}
        <label class="flex items-center justify-between gap-3 bg-slate-800/60 hover:bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 cursor-pointer transition">
            <span class="flex items-center gap-3">
                <input type="radio" name="page_id" value="{{ page.id }}" {% if forloop.first %}checked{% endif %} class="accent-blue-600">
                <span class="text-sm text-slate-200 font-semibold">{{ page.name }}</span>
            </span>
            <span class="text-xs text-slate-500">{{ page.category|default:"" }}</span>
        </label>
        {% endfor %}
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold px-6 py-3 rounded-xl transition">
            تأكيد الربط
        </button>
    </form>
</div>
{% endblock %}
